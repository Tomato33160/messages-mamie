<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messages pour Mamie</title>
    
    <link rel="apple-touch-icon" href="icone.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icone.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icone.png">
    <link rel="icon" type="image/png" href="icone.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg: #fff9fb;
            --card: #ffffff;
            --text: #4a4a4a;
            --accent: #ff8fa3;
            --title: #d63384;
            --promise-bg: #ffeef2;
        }

        body.dark-mode {
            --bg: #1a1a2e;
            --card: #16213e;
            --text: #ffffff;
            --accent: #e94560;
            --title: #ff4d6d;
            --promise-bg: #0f3460;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 30px 20px;
            transition: background 0.8s ease;
        }

        h1 { font-size: 2.5rem; color: var(--title); margin: 20px 0; font-weight: 800; text-align: center; }

        .promise {
            font-size: 1.1rem; color: #884d6d; background: var(--promise-bg);
            padding: 20px; border-radius: 20px; margin-bottom: 40px;
            text-align: center; max-width: 450px; border: 2px dashed var(--accent);
            line-height: 1.5;
        }
        body.dark-mode .promise { color: #eee; }

        .grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 25px; width: 100%; max-width: 450px;
        }

        .sound-btn {
            aspect-ratio: 1/1; background: var(--card); border: none;
            border-radius: 40px; box-shadow: 0 10px 30px rgba(214, 51, 132, 0.15);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: transform 0.1s ease;
        }
        .sound-btn:active { transform: scale(0.9); }
        .emoji { font-size: 4rem; margin-bottom: 10px; pointer-events: none; }
        .label { font-size: 1.2rem; font-weight: 700; color: #555; pointer-events: none; }
        body.dark-mode .label { color: #eee; }

        .love-card { background: var(--card); padding: 30px; border-radius: 35px; margin-top: 50px; text-align: center; width: 100%; max-width: 400px; border: 2px solid #ffeef2; }
        .submit-btn { background: var(--accent); color: white; border: none; padding: 18px 35px; border-radius: 50px; font-weight: bold; font-size: 1.2rem; cursor: pointer; }

        .footer { margin-top: 60px; font-size: 1.4rem; color: var(--title); font-weight: 900; text-align: center; padding-bottom: 50px; }
    </style>
</head>
<body id="mainBody">

    <h1>Coucou Mamie ! ❤️</h1>
    
    <div class="promise">
        Quatre nouveaux messages seront ajoutés chaque semaine à l'app, garde des stocks, et profite bien ! ❤️
    </div>

    <div class="grid">
        <button class="sound-btn" onclick="boostedPlay('matin.m4a')">
            <span class="emoji">☀️</span><span class="label">Bonjour</span>
        </button>
        <button class="sound-btn" onclick="boostedPlay('blague.m4a')">
            <span class="emoji">😂</span><span class="label">Blague</span>
        </button>
        <button class="sound-btn" onclick="boostedPlay('souvenir.m4a')">
            <span class="emoji">💭</span><span class="label">Souvenir</span>
        </button>
        <button class="sound-btn" onclick="boostedPlay('calin.m4a')">
            <span class="emoji">🧸</span><span class="label">Bisou</span>
        </button>
    </div>

    <div class="love-card">
        <form action="https://formspree.io/f/maqdkzpw" method="POST">
            <input type="hidden" name="_subject" value="Message de Mamie !">
            <button type="submit" class="submit-btn">Oui, j'ai tout écouté ! ❤️</button>
        </form>
    </div>

    <div class="footer">
        Fait avec 💖 par ton petit-fils Tom
    </div>

    <script>
        let audioCtx = null;
        let currentSource = null;

        function boostedPlay(file) {
            // Création du contexte audio au premier clic
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            if (currentSource) { 
                try { currentSource.stop(); } catch(e) {}
            }

            fetch(file)
                .then(response => response.arrayBuffer())
                .then(arrayBuffer => audioCtx.decodeAudioData(arrayBuffer))
                .then(audioBuffer => {
                    const source = audioCtx.createBufferSource();
                    const gainNode = audioCtx.createGain();

                    // Boost de volume (3 = 300%)
                    gainNode.gain.value = 3; 

                    source.buffer = audioBuffer;
                    source.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    source.start();
                    currentSource = source;
                })
                .catch(e => {
                    console.error("Erreur :", e);
                    // Fallback si le fetch échoue (lecture simple)
                    let simpleAudio = new Audio(file);
                    simpleAudio.volume = 1.0;
                    simpleAudio.play();
                });
        }

        function checkTime() {
            const hour = new Date().getHours();
            if (hour < 8 || hour >= 20) { document.getElementById('mainBody').classList.add('dark-mode'); }
            else { document.getElementById('mainBody').classList.remove('dark-mode'); }
        }
        checkTime();
    </script>
</body>
</html>
